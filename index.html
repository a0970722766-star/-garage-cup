<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>車庫大賽 最終版</title>

<style>
body{
  margin:0;
  background:#000;
  color:#fff;
  text-align:center;
  font-family:sans-serif;
}

h1{margin-top:20px;}

#result{
  position:absolute;
  right:20px;
  top:20px;
  text-align:left;
  font-size:16px;
  line-height:1.8;
}

textarea{
  width:90%;
  height:120px;
  margin:10px;
  border-radius:10px;
}

button,select{
  padding:8px;
  margin:5px;
  border-radius:8px;
  border:none;
}

#view{
  overflow:auto;
  height:80vh;
  white-space:nowrap;
}

.round{
  display:inline-block;
  position:relative;
  margin:0 40px;
}

.match{
  position:absolute;
}

.player{
  width:140px;
  padding:8px;
  margin:6px 0;
  border-radius:8px;
  background:#2ecc71;
  cursor:pointer;
}

.win{background:#00c853;}
.lose{background:#444;}

.label{
  font-size:12px;
  opacity:0.6;
}
</style>
</head>

<body>

<h1>🏆 車庫大賽</h1>

<div id="result"></div>

<select id="mode">
<option value="8">8人</option>
<option value="16">16人</option>
<option value="32">32人</option>
<option value="64">64人</option>
</select>

<br>

<button onclick="start()">開始</button>
<button onclick="undo()">撤回</button>

<textarea id="input">玩家1
玩家2
玩家3
玩家4
玩家5
玩家6
玩家7
玩家8</textarea>

<div id="view">
  <div id="bracket"></div>
</div>

<script>

let rounds=[];
let history=[];
let thirdMatch=null;

function start(){

  let names=document.getElementById("input").value
    .split("\n")
    .map(x=>x.trim())
    .filter(x=>x);

  let size=parseInt(document.getElementById("mode").value);

  while(names.length<size){
    names.push("玩家"+(names.length+1));
  }

  rounds=[];
  history=[];

  let cur=[...names];

  while(cur.length>1){
    let r=[];
    let next=[];

    for(let i=0;i<cur.length;i+=2){
      r.push({p1:cur[i],p2:cur[i+1],winner:null});
      next.push(null);
    }

    rounds.push(r);
    cur=next;
  }

  // 季軍賽
  thirdMatch = {p1:null,p2:null,winner:null};

  render();
}

function render(){

  let container=document.getElementById("bracket");
  container.innerHTML="";

  let rowH = 80;
  let colW = 180;

  let positions=[];

  rounds.forEach((round,ri)=>{

    positions[ri]=[];

    let col=document.createElement("div");
    col.className="round";

    round.forEach((m,mi)=>{

      let div=document.createElement("div");
      div.className="match";

      let y;

      if(ri===0){
        y = mi * rowH * 2;
      }else{
        let y1 = positions[ri-1][mi*2];
        let y2 = positions[ri-1][mi*2+1];
        y = (y1 + y2) / 2;
      }

      positions[ri][mi]=y;
      div.style.top=y+"px";

      // 場次（每輪重新）
      let label=document.createElement("div");
      label.className="label";
      label.innerText="第"+(mi+1)+"場";

      div.appendChild(label);
      div.appendChild(makePlayer(m,"p1"));
      div.appendChild(makePlayer(m,"p2"));

      col.appendChild(div);
    });

    container.appendChild(col);
  });

  renderThird();
  renderResult();
}

function makePlayer(m,key){

  let d=document.createElement("div");
  d.className="player";

  let name=m[key]||"-";
  d.innerText=name;

  if(m.winner){
    if(name===m.winner)d.classList.add("win");
    else d.classList.add("lose");
  }

  d.onclick=function(){
    if(name=="-")return;

    m.winner=name;
    history.push(m);

    propagate();
    render();
  };

  return d;
}

function propagate(){

  for(let i=0;i<rounds.length-1;i++){
    let r=rounds[i];
    let n=rounds[i+1];

    r.forEach((m,mi)=>{
      if(m.winner){
        let idx=Math.floor(mi/2);
        let slot=(mi%2===0?"p1":"p2");
        n[idx][slot]=m.winner;
      }
    });
  }

  // 半決賽輸家進季軍賽
  if(rounds.length>=2){
    let semi=rounds[rounds.length-2];
    if(semi.length===2){
      thirdMatch.p1 = semi[0].p1===semi[0].winner?semi[0].p2:semi[0].p1;
      thirdMatch.p2 = semi[1].p1===semi[1].winner?semi[1].p2:semi[1].p1;
    }
  }
}

function renderThird(){

  if(!thirdMatch) return;

  let box=document.createElement("div");
  box.style.marginTop="40px";

  let title=document.createElement("div");
  title.innerText="🥉 季軍賽";

  box.appendChild(title);
  box.appendChild(makePlayer(thirdMatch,"p1"));
  box.appendChild(makePlayer(thirdMatch,"p2"));

  document.getElementById("bracket").appendChild(box);
}

function renderResult(){

  let final = rounds[rounds.length-1][0];

  let champ = final.winner || "?";
  let runner = final.p1===champ ? final.p2 : final.p1;

  let third = thirdMatch?.winner || "?";

  document.getElementById("result").innerHTML = `
  🥇冠軍：${champ}<br>
  🥈亞軍：${runner || "?"}<br>
  🥉季軍：${third}
  `;
}

function undo(){
  let m=history.pop();
  if(!m)return;

  m.winner=null;
  propagate();
  render();
}

</script>

</body>
</html>
