<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>車庫大賽 Pro Final</title>

<style>
body{
  margin:0;
  background:#000;
  color:#fff;
  font-family:sans-serif;
}

h1{text-align:center;margin:20px;}

.controls{
  text-align:center;
  margin:10px;
}

textarea{
  width:90%;
  height:100px;
  margin:auto;
  display:block;
  border-radius:10px;
}

#view{
  overflow:auto;
  width:100%;
  height:70vh;
  touch-action:none;
}

#bracket{
  position:relative;
  transform-origin:0 0;
}

.match{
  position:absolute;
}

.player{
  background:#2ecc71;
  padding:10px;
  margin:5px 0;
  border-radius:10px;
  cursor:pointer;
  width:140px;
  text-align:center;
  user-select:none;
}

.win{background:#00c853;}
.lose{background:#555;}

svg{
  position:absolute;
  top:0;
  left:0;
  pointer-events:none;
}

.result{
  text-align:center;
  margin:20px;
  font-size:18px;
}
</style>
</head>

<body>

<h1>🏆 車庫大賽 Pro</h1>

<div class="controls">
<select id="mode">
<option>8</option>
<option>16</option>
<option>32</option>
<option>48</option>
<option>64</option>
</select>

<button onclick="start()">開始</button>
<button onclick="undo()">撤回</button>
<button onclick="zoom(1.2)">放大</button>
<button onclick="zoom(0.8)">縮小</button>
</div>

<textarea id="input">玩家1
玩家2
玩家3
玩家4
玩家5
玩家6
玩家7
玩家8</textarea>

<div id="view">
  <div id="bracket"></div>
  <svg id="lines"></svg>
</div>

<div class="result" id="result"></div>

<script>
const input = document.getElementById("input");
const bracket = document.getElementById("bracket");
const lines = document.getElementById("lines");
const result = document.getElementById("result");
const modeSelect = document.getElementById("mode");

let rounds=[], history=[], scale=1;

function start(){
  let names=input.value.split("\n").filter(x=>x.trim());
  let mode=parseInt(modeSelect.value);

  while(names.length<mode){
    names.push("玩家"+(names.length+1));
  }

  history=[];
  rounds=[];
  let current=[...names];

  if(mode===48){
    build48(current);
  }else{
    buildNormal(current);
  }

  render();
}

function buildNormal(current){
  while(current.length>1){
    let r=[], next=[];
    for(let i=0;i<current.length;i+=2){
      r.push({p1:current[i],p2:current[i+1],winner:null,loser:null});
      next.push(null);
    }
    rounds.push(r);
    current=next;
  }
}

function build48(current){
  // 48→24→12→6→3
  while(current.length>3){
    let r=[], next=[];
    for(let i=0;i<current.length;i+=2){
      r.push({p1:current[i],p2:current[i+1],winner:null,loser:null});
      next.push(null);
    }
    rounds.push(r);
    current=next;
  }
  rounds.push({type:"final3",players:current});
}

function render(){
  bracket.innerHTML="";
  lines.innerHTML="";

  let colW=220, rowH=100;

  rounds.forEach((round,ri)=>{

    if(round.type==="final3"){
      renderFinal3(round);
      return;
    }

    round.forEach((m,mi)=>{
      let x=ricolW;
      let y=mirowHMath.pow(2,ri);

      let div=document.createElement("div");
      div.className="match";
      div.style.left=x+"px";
      div.style.top=y+"px";

      div.appendChild(createPlayer(m,"p1"));
      div.appendChild(createPlayer(m,"p2"));

      bracket.appendChild(div);

      if(ri>0){
        let prev=Math.floor(mi/2);
        let y1=prevrowHMath.pow(2,ri-1)+20;
        let y2=y+20;
        drawLine(x-60,y1,x,y2);
      }
    });
  });

  bracket.style.width=(rounds.length250)+"px";
  bracket.style.height="2000px";
}

function createPlayer(m,key){
  let div=document.createElement("div");
  div.className="player";
  let name=m[key];
  div.innerText=name||"?";

  if(m.winner){
    if(name===m.winner) div.classList.add("win");
    else div.classList.add("lose");
  }

  div.onclick=()=>{
    if(!name) return;
    m.winner=name;
    m.loser=(key==="p1"?m.p2:m.p1);
    history.push(m);
    update();
    render();
  }

  return div;
}

function drawLine(x1,y1,x2,y2){
  let p=document.createElementNS("http://www.w3.org/2000/svg","path");
  p.setAttribute("d",M${x1} ${y1} H${x2-30} V${y2} H${x2});
  p.setAttribute("stroke","#fff");
  p.setAttribute("fill","none");
  lines.appendChild(p);
}

function update(){
  for(let i=0;i<rounds.length-1;i++){
    let r=rounds[i];
    let n=rounds[i+1];

    if(n.type==="final3") continue;

    r.forEach((m,mi)=>{
      if(m.winner){
        let idx=Math.floor(mi/2);
        let slot=(mi%2===0?"p1":"p2");
        n[idx][slot]=m.winner;
      }
    });
  }

  calcResult();
}

function calcResult(){
  let last=rounds[rounds.length-1];

  if(last.type==="final3") return;

  if(last.length===1 && last[0].winner){
    let champ=last[0].winner;
    let runner=last[0].loser;

    let semi=rounds[rounds.length-2];
    let a=semi[0].loser;
    let b=semi[1].loser;

    result.innerHTML=    🥇 ${champ}<br>     🥈 ${runner}<br>     🥉 <button onclick="third('${a}','${b}')">${a} vs ${b}</button>    ;
  }
}

function third(a,b){
  let win=confirm(選 ${a}? 取消=${b})?a:b;
  result.innerHTML+=<br>🥉 ${win};
}

let scoreBoard={};

function renderFinal3(r){
  let p=r.players;
  scoreBoard={};

  result.innerHTML=  🏆 三人循環賽<br>   <button onclick="score('${p[0]}','${p[1]}')">${p[0]} vs ${p[1]}</button><br>   <button onclick="score('${p[1]}','${p[2]}')">${p[1]} vs ${p[2]}</button><br>   <button onclick="score('${p[0]}','${p[2]}')">${p[0]} vs ${p[2]}</button>  ;
}

function score(a,b){
  let w=confirm(選 ${a}? 取消=${b})?a:b;
  scoreBoard[w]=(scoreBoard[w]||0)+1;

  if(Object.values(scoreBoard).reduce((a,b)=>a+b,0)>=3){
    let s=Object.entries(scoreBoard).sort((a,b)=>b[1]-a[1]);
    result.innerHTML=    🥇 ${s[0][0]}<br>     🥈 ${s[1][0]}<br>     🥉 ${s[2][0]}    ;
  }
}

function undo(){
  let m=history.pop();
  if(!m) return;
  m.winner=null;
  update();
  render();
}

function zoom(f){
  scale*=f;
  bracket.style.transform=scale(${scale});
}
</script>

</body>
</html>
