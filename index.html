<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>車庫大賽 Ultimate</title>

<style>
body{
  margin:0;
  background:#000;
  color:#fff;
  font-family:sans-serif;
}

h1{text-align:center;}

.controls{
  text-align:center;
  margin:10px;
}

textarea{
  width:90%;
  height:100px;
  margin:auto;
  display:block;
  border-radius:10px;
}

#view{
  overflow:auto;
  width:100%;
  height:70vh;
}

#bracket{
  position:relative;
}

.match{
  position:absolute;
}

.player{
  background:#2ecc71;
  padding:8px;
  margin:4px 0;
  border-radius:8px;
  cursor:pointer;
  width:140px;
  text-align:center;
}

.win{background:#00c853;}
.lose{background:#444;}

svg{
  position:absolute;
  top:0;
  left:0;
}
.result{
  text-align:center;
  margin:20px;
}
</style>
</head>

<body>

<h1>🏆 車庫大賽 Ultimate</h1>

<div class="controls">
<select id="mode">
<option>8</option>
<option>16</option>
<option>32</option>
<option>48</option>
<option>64</option>
</select>

<button onclick="start()">開始</button>
<button onclick="undo()">撤回</button>
</div>

<textarea id="input">玩家1
玩家2
玩家3
玩家4
玩家5
玩家6
玩家7
玩家8</textarea>

<div id="view">
  <div id="bracket"></div>
  <svg id="lines"></svg>
</div>

<div class="result" id="result"></div>

<script>
let rounds=[];
let history=[];

function start(){
  let names=input.value.split("\n").filter(x=>x.trim());
  let mode=parseInt(modeSelect.value);

  while(names.length<mode){
    names.push("玩家"+(names.length+1));
  }

  rounds=[];
  let current=[...names];

  let is48 = mode===48;

  while(true){

    if(is48 && current.length===3){
      rounds.push({type:"final3",players:[...current]});
      break;
    }

    if(!is48 && current.length===1) break;

    let r=[];
    let next=[];

    for(let i=0;i<current.length;i+=2){
      let m={
        p1:current[i],
        p2:current[i+1]||null,
        winner:null,
        loser:null
      };
      r.push(m);
      next.push(null);
    }

    rounds.push(r);
    current=next;
  }

  render();
}

function render(){
  bracket.innerHTML="";
  lines.innerHTML="";

  let colW=220;
  let rowH=100;

  rounds.forEach((round,ri)=>{

    if(round.type==="final3"){
      renderFinal3(round);
      return;
    }

    round.forEach((m,mi)=>{
      let x=ri*colW;
      let y=mi*rowH*Math.pow(2,ri);

      let div=document.createElement("div");
      div.className="match";
      div.style.left=x+"px";
      div.style.top=y+"px";

      let p1=create(m,"p1");
      let p2=create(m,"p2");

      div.appendChild(p1);
      div.appendChild(p2);
      bracket.appendChild(div);

      // 畫線
      if(ri>0){
        let prev=Math.floor(mi/2);

        let y1=prev*rowH*Math.pow(2,ri-1)+20;
        let y2=y+20;

        drawLine(x-70,y1,x,y2);
      }
    });
  });

  bracket.style.width=(rounds.length*240)+"px";
  bracket.style.height="2000px";
}

function create(m,key){
  let div=document.createElement("div");
  div.className="player";

  let name=m[key];
  div.innerText=name||"?";

  if(m.winner){
    if(m.winner===name) div.classList.add("win");
    else div.classList.add("lose");
  }

  div.onclick=()=>{
    if(!name) return;

    m.winner=name;
    m.loser = key==="p1"?m.p2:m.p1;

    history.push(m);

    update();
    render();
  }

  return div;
}

function drawLine(x1,y1,x2,y2){
  let path=document.createElementNS("http://www.w3.org/2000/svg","path");
  let d=`M${x1} ${y1} H${x2-30} V${y2} H${x2}`;
  path.setAttribute("d",d);
  path.setAttribute("stroke","#fff");
  path.setAttribute("fill","none");
  lines.appendChild(path);
}

function update(){
  for(let i=0;i<rounds.length-1;i++){
    let r=rounds[i];
    let n=rounds[i+1];

    if(n.type==="final3") continue;

    r.forEach((m,mi)=>{
      if(m.winner){
        let idx=Math.floor(mi/2);
        let slot = mi%2===0?"p1":"p2";
        n[idx][slot]=m.winner;
      }
    });
  }

  calcResult();
}

function calcResult(){
  let last=rounds[rounds.length-1];

  if(last.type==="final3") return;

  if(last.length===1 && last[0].winner){
    let champ=last[0].winner;
    let runner=last[0].loser;

    let semi=rounds[rounds.length-2];
    let a=semi[0].loser;
    let b=semi[1].loser;

    result.innerHTML=`
    🥇 ${champ}<br>
    🥈 ${runner}<br>
    🥉 <button onclick="pickThird('${a}','${b}')">${a} vs ${b}</button>
    `;
  }
}

function pickThird(a,b){
  let win=confirm(`選 ${a}? 取消=選 ${b}`)?a:b;
  result.innerHTML+=`<br>🥉 ${win}`;
}

function renderFinal3(r){
  let p=r.players;

  result.innerHTML=`
  🥇🥈🥉 三人循環<br>
  <button onclick="score('${p[0]}','${p[1]}')">${p[0]} vs ${p[1]}</button><br>
  <button onclick="score('${p[1]}','${p[2]}')">${p[1]} vs ${p[2]}</button><br>
  <button onclick="score('${p[0]}','${p[2]}')">${p[0]} vs ${p[2]}</button>
  `;
}

let scoreBoard={};

function score(a,b){
  let w=confirm(`選 ${a}? 取消=${b}`)?a:b;
  scoreBoard[w]=(scoreBoard[w]||0)+1;

  if(Object.values(scoreBoard).reduce((a,b)=>a+b,0)>=3){
    let s=Object.entries(scoreBoard).sort((a,b)=>b[1]-a[1]);
    result.innerHTML=`
    🥇 ${s[0][0]}<br>
    🥈 ${s[1][0]}<br>
    🥉 ${s[2][0]}
    `;
  }
}

function undo(){
  let m=history.pop();
  if(!m) return;
  m.winner=null;
  update();
  render();
}
</script>

</body>
</html>
