<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>車庫大賽 完整穩定版</title>

<style>
body{
  margin:0;
  background:#000;
  color:#fff;
  text-align:center;
  font-family:sans-serif;
}

h1{margin:20px 0;}

textarea{
  width:90%;
  height:120px;
  margin:10px;
  border-radius:10px;
}

button,select{
  padding:8px;
  margin:5px;
  border-radius:8px;
  border:none;
}

#view{
  overflow:auto;
  height:70vh;
}

#bracket{
  position:relative;
  min-height:1500px;
}

.match{
  position:absolute;
}

.player{
  width:140px;
  padding:8px;
  margin:3px 0;
  border-radius:8px;
  background:#2ecc71;
  cursor:pointer;
  text-align:center;
}

.win{background:#00c853;}
.lose{background:#444;}

svg{
  position:absolute;
  top:0;
  left:0;
  pointer-events:none;
}
</style>
</head>

<body>

<h1>🏆 車庫大賽</h1>

<select id="mode">
<option value="8">8人</option>
<option value="16">16人</option>
<option value="32">32人</option>
<option value="64">64人</option>
</select>

<br>

<button onclick="start()">開始</button>
<button onclick="undo()">撤回</button>

<textarea id="input">玩家1
玩家2
玩家3
玩家4
玩家5
玩家6
玩家7
玩家8</textarea>

<div id="view">
  <div id="bracket"></div>
  <svg id="lines"></svg>
</div>

<script>

let rounds=[];
let history=[];

function start(){

  let names=document.getElementById("input").value
    .split("\n")
    .map(x=>x.trim())
    .filter(x=>x);

  let size=parseInt(document.getElementById("mode").value);

  while(names.length<size){
    names.push("玩家"+(names.length+1));
  }

  rounds=[];
  history=[];

  let cur=[...names];

  while(cur.length>1){
    let r=[];
    let next=[];

    for(let i=0;i<cur.length;i+=2){
      r.push({p1:cur[i],p2:cur[i+1],winner:null});
      next.push(null);
    }

    rounds.push(r);
    cur=next;
  }

  render();
}

function render(){

  let bracket=document.getElementById("bracket");
  let lines=document.getElementById("lines");

  bracket.innerHTML="";
  lines.innerHTML="";

  let colW=180;
  let baseY=50;

  let pos=[];

  rounds.forEach((round,ri)=>{

    pos[ri]=[];

    round.forEach((m,mi)=>{

      let x = ri * colW;
      let y;

      // 第一輪：兩個靠一起 + 場與場有間距
      if(ri===0){
        let matchIndex = Math.floor(mi/2);
        let offset = mi % 2;
        y = matchIndex * (baseY * 3) + offset * baseY;
      }
      // 後面輪數：取中間
      else{
        let y1 = pos[ri-1][mi2];
        let y2 = pos[ri-1][mi2+1];
        y = (y1 + y2) / 2;
      }

      pos[ri][mi] = y;

      let div=document.createElement("div");
      div.className="match";
      div.style.left=x+"px";
      div.style.top=y+"px";

      div.appendChild(player(m,"p1"));
      div.appendChild(player(m,"p2"));

      bracket.appendChild(div);

      // 畫線（兩條）
      if(ri>0){
        let y1 = pos[ri-1][mi2];
        let y2 = pos[ri-1][mi2+1];

        drawLine(x-40, y1+15, x, y+15);
        drawLine(x-40, y2+15, x, y+15);
      }

    });

  });

  bracket.style.width = (rounds.length * 200) + "px";
}

function player(m,key){

  let d=document.createElement("div");
  d.className="player";

  let name=m[key];

  if(!name){
    d.innerText="";
    d.style.background="#222";
    return d;
  }

  d.innerText=name;

  if(m.winner){
    if(name===m.winner)d.classList.add("win");
    else d.classList.add("lose");
  }

  d.onclick=()=>{
    m.winner=name;
    history.push(m);
    propagate();
    render();
  };

  return d;
}

function propagate(){

  for(let i=0;i<rounds.length-1;i++){

    let r=rounds[i];
    let n=rounds[i+1];

    r.forEach((m,mi)=>{
      if(m.winner){
        let idx=Math.floor(mi/2);
        let slot=(mi%2===0?"p1":"p2");
        n[idx][slot]=m.winner;
      }
    });

  }
}

function drawLine(x1,y1,x2,y2){

  let path=document.createElementNS("http://www.w3.org/2000/svg","path");

  path.setAttribute(
    "d",
    "M"+x1+" "+y1+" H"+(x2-20)+" V"+y2+" H"+x2
  );

  path.setAttribute("stroke","#fff");
  path.setAttribute("fill","none");

  document.getElementById("lines").appendChild(path);
}

function undo(){
  let m=history.pop();
  if(!m)return;
  m.winner=null;
  propagate();
  render();
}

</script>

</body>
</html>
