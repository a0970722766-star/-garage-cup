<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>車庫大賽 最終完整版</title>

<style>
body{
  margin:0;
  background:#000;
  color:#fff;
  text-align:center;
  font-family:sans-serif;
}

textarea{
  width:90%;
  height:120px;
  margin:10px;
  border-radius:10px;
}

button,select{
  padding:8px;
  margin:5px;
  border-radius:8px;
  border:none;
}

#view{
  overflow:auto;
  height:80vh;
}

/* 右上角結果 */
#resultBox{
  position:absolute;
  right:20px;
  top:80px;
  text-align:left;
  font-size:18px;
  line-height:1.8;
}

/* 整體 */
#bracket{
  display:flex;
  align-items:flex-start;
  padding:20px;
}

/* 每一輪 */
.round{
  display:flex;
  flex-direction:column;
  margin:0 40px;
}

/* 每一場 */
.match{
  display:flex;
  flex-direction:column;
  align-items:center;
  margin-bottom:40px;
}

/* 玩家 */
.player{
  width:140px;
  height:36px;
  line-height:36px;
  margin:4px 0;
  border-radius:8px;
  background:#2ecc71;
  cursor:pointer;
}

.win{background:#00c853;}
.lose{background:#444;}
</style>
</head>

<body>

<h1>🏆 車庫大賽</h1>

<div id="resultBox"></div>

<select id="mode">
<option value="8">8人</option>
<option value="16">16人</option>
<option value="32">32人</option>
<option value="64">64人</option>
</select>

<br>

<button onclick="start()">開始</button>
<button onclick="undo()">撤回</button>

<textarea id="input">玩家1
玩家2
玩家3
玩家4
玩家5
玩家6
玩家7
玩家8</textarea>

<div id="view">
  <div id="bracket"></div>
</div>

<script>

let rounds=[];
let history=[];
let thirdMatch={p1:null,p2:null,winner:null};

function start(){

  let names=document.getElementById("input").value
    .split("\n")
    .map(x=>x.trim())
    .filter(x=>x);

  let size=parseInt(document.getElementById("mode").value);

  while(names.length<size){
    names.push("玩家"+(names.length+1));
  }

  rounds=[];
  history=[];
  thirdMatch={p1:null,p2:null,winner:null};

  let cur=[...names];

  while(cur.length>1){
    let r=[];
    let next=[];

    for(let i=0;i<cur.length;i+=2){
      r.push({p1:cur[i],p2:cur[i+1],winner:null});
      next.push(null);
    }

    rounds.push(r);
    cur=next;
  }

  render();
}

function render(){

  let container=document.getElementById("bracket");
  container.innerHTML="";

  rounds.forEach((round,ri)=>{

    let col=document.createElement("div");
    col.className="round";

    let gap=Math.pow(2,ri);

    round.forEach((m,mi)=>{

      let div=document.createElement("div");
      div.className="match";

      /* 金字塔置中 */
      div.style.marginTop = (gap===1?0:(gap-1)*40)+"px";

      div.appendChild(makePlayer(m,"p1"));
      div.appendChild(makePlayer(m,"p2"));

      col.appendChild(div);

    });

    container.appendChild(col);
  });

  renderThird();
  renderResult();
}

function makePlayer(m,key){

  let d=document.createElement("div");
  d.className="player";

  let name=m[key]||"";
  d.innerText=name;

  if(m.winner){
    if(name===m.winner)d.classList.add("win");
    else d.classList.add("lose");
  }

  d.onclick=function(){
    if(!name)return;

    m.winner=name;
    history.push(m);

    propagate();
    render();
  };

  return d;
}

function propagate(){

  for(let i=0;i<rounds.length-1;i++){

    let r=rounds[i];
    let n=rounds[i+1];

    r.forEach((m,mi)=>{
      if(m.winner){
        let idx=Math.floor(mi/2);
        let slot=mi%2===0?"p1":"p2";
        n[idx][slot]=m.winner;
      }
    });
  }

  /* 🔥 產生季軍賽 */
  if(rounds.length>=2){
    let semi=rounds[rounds.length-2];

    let losers=semi.map(m=>{
      if(!m.winner)return null;
      return m.p1===m.winner?m.p2:m.p1;
    }).filter(x=>x);

    if(losers.length===2){
      thirdMatch.p1=losers[0];
      thirdMatch.p2=losers[1];
    }
  }
}

/* 季軍賽 */
function renderThird(){

  if(!thirdMatch.p1)return;

  let container=document.getElementById("bracket");

  let col=document.createElement("div");
  col.className="round";

  let title=document.createElement("div");
  title.innerHTML="🥉 季軍賽";
  title.style.marginBottom="10px";

  col.appendChild(title);

  let div=document.createElement("div");
  div.className="match";

  div.appendChild(makeThirdPlayer("p1"));
  div.appendChild(makeThirdPlayer("p2"));

  col.appendChild(div);

  container.appendChild(col);
}

function makeThirdPlayer(key){

  let d=document.createElement("div");
  d.className="player";

  let name=thirdMatch[key];
  d.innerText=name||"";

  if(thirdMatch.winner){
    if(name===thirdMatch.winner)d.classList.add("win");
    else d.classList.add("lose");
  }

  d.onclick=function(){
    if(!name)return;

    thirdMatch.winner=name;
    render();
  };

  return d;
}

/* 右上角結果 */
function renderResult(){

  let box=document.getElementById("resultBox");

  let final=rounds[rounds.length-1][0];
  if(!final.winner){
    box.innerHTML="";
    return;
  }

  let champion=final.winner;
  let runner=final.p1===champion?final.p2:final.p1;
  let third=thirdMatch.winner||"?";

  box.innerHTML=`
  🥇 冠軍：${champion}<br>
  🥈 亞軍：${runner}<br>
  🥉 季軍：${third}
  `;
}

function undo(){
  let m=history.pop();
  if(!m)return;

  m.winner=null;
  propagate();
  render();
}

</script>

</body>
</html>
