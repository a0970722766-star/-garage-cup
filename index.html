<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>車庫大賽</title>

<style>
body{
  margin:0;
  background:#000;
  color:#fff;
  font-family:sans-serif;
  text-align:center;
}

h1{margin:20px}

.controls{
  display:flex;
  gap:10px;
  justify-content:center;
  flex-wrap:wrap;
}

textarea{
  width:90%;
  height:120px;
  margin:10px;
  border-radius:10px;
  padding:10px;
}

button,select{
  padding:10px 15px;
  border-radius:10px;
  border:none;
}

#wrap{
  overflow:auto;
  width:100%;
  height:70vh;
  border-top:1px solid #333;
}

#stage{
  position:relative;
  transform-origin:0 0;
}

.match{
  position:absolute;
  width:140px;
}

.player{
  background:#1f9d3a;
  margin:4px 0;
  padding:8px;
  border-radius:8px;
  cursor:pointer;
}

.player.win{
  background:#4caf50;
}

.player.lose{
  background:#555;
}

.result{
  margin-top:20px;
}

canvas{
  position:absolute;
  top:0;
  left:0;
}
</style>
</head>

<body>

<h1>🏆 車庫大賽</h1>

<div class="controls">
<select id="mode">
<option value="8">8人</option>
<option value="16">16人</option>
<option value="32">32人</option>
<option value="48">48人（循環）</option>
<option value="64">64人</option>
</select>

<button onclick="start()">開始</button>
<button onclick="undo()">撤回</button>
<button onclick="zoom(1.2)">放大</button>
<button onclick="zoom(0.8)">縮小</button>
</div>

<textarea id="input">玩家1
玩家2
玩家3
玩家4
玩家5
玩家6
玩家7
玩家8</textarea>

<div id="wrap">
  <div id="stage"></div>
  <canvas id="lines"></canvas>
</div>

<div class="result" id="result"></div>

<script>
let rounds=[];
let history=[];
let scale=1;

function zoom(s){
  scale*=s;
  stage.style.transform=`scale(${scale})`;
}

function undo(){
  if(history.length===0)return;
  let last=history.pop();
  last.match.winner=null;
  render();
}

function start(){
  let names=input.value.split("\n").filter(x=>x);
  let mode=parseInt(document.getElementById("mode").value);

  if(names.length<mode){
    for(let i=names.length;i<mode;i++){
      names.push("玩家"+(i+1));
    }
  }

  rounds=build(names,mode);
  history=[];
  render();
}

function build(players,mode){
  let r=[];
  let cur=[...players];

  let is48 = mode===48;

  while(true){

    if(is48 && cur.length===3){
      r.push({type:"final3",players:[...cur]});
      break;
    }

    if(!is48 && cur.length<=1) break;

    let matches=[];
    let next=[];

    for(let i=0;i<cur.length;i+=2){
      let p1=cur[i];
      let p2=cur[i+1] || null;

      matches.push({p1,p2,winner:null,loser:null});
      next.push(null);
    }

    r.push(matches);
    cur=next;
  }

  return r;
}

function render(){
  stage.innerHTML="";
  let canvas=document.getElementById("lines");
  let ctx=canvas.getContext("2d");

  let w=200;
  let h=80;

  canvas.width=3000;
  canvas.height=2000;
  ctx.clearRect(0,0,canvas.width,canvas.height);

  rounds.forEach((round,ri)=>{

    if(round.type==="final3"){
      drawFinal3(round,ri);
      return;
    }

    round.forEach((m,mi)=>{
      let x=ri*w;
      let y=mi*h*2;

      let div=document.createElement("div");
      div.className="match";
      div.style.left=x+"px";
      div.style.top=y+"px";

      let p1=document.createElement("div");
      let p2=document.createElement("div");

      p1.className="player";
      p2.className="player";

      p1.innerText=m.p1 || "?";
      p2.innerText=m.p2 || "?";

      p1.onclick=()=>select(m,0);
      p2.onclick=()=>select(m,1);

      if(m.winner){
        if(m.winner===m.p1){
          p1.classList.add("win");
          p2.classList.add("lose");
        }else{
          p2.classList.add("win");
          p1.classList.add("lose");
        }
      }

      div.appendChild(p1);
      div.appendChild(p2);
      stage.appendChild(div);

      if(ri>0){
        let prev=rounds[ri-1];
        let prevIndex=Math.floor(mi/2);

        let px=(ri-1)*w+140;
        let py=prevIndex*h*2+20;

        let cx=x;
        let cy=y+20;

        ctx.beginPath();
        ctx.moveTo(px,py);
        ctx.lineTo(cx,cy);
        ctx.strokeStyle="#fff";
        ctx.stroke();
      }
    });
  });
}

function select(match,side){
  let winner = side===0?match.p1:match.p2;
  let loser  = side===0?match.p2:match.p1;

  if(!winner) return;

  match.winner=winner;
  match.loser=loser;

  history.push({match});

  propagate();
  render();
}

function propagate(){
  for(let i=0;i<rounds.length-1;i++){
    let round=rounds[i];
    let next=rounds[i+1];

    if(next.type==="final3") continue;

    round.forEach((m,mi)=>{
      if(m.winner){
        let idx=Math.floor(mi/2);
        let slot=mi%2===0?"p1":"p2";
        next[idx][slot]=m.winner;
      }
    });
  }

  handleFinals();
}

function handleFinals(){
  let last=rounds[rounds.length-1];
  if(last.type==="final3") return;

  if(last.length===1 && last[0].winner){
    let champion=last[0].winner;
    let runner=last[0].loser;

    let semi=rounds[rounds.length-2];

    let losers=[];
    semi.forEach(m=>{
      if(m.loser) losers.push(m.loser);
    });

    if(losers.length===2){
      let div=document.getElementById("result");
      div.innerHTML=`
      🥇 ${champion}<br>
      🥈 ${runner}<br>
      🥉 ${losers[0]} vs ${losers[1]}
      `;
    }
  }
}

function drawFinal3(round,ri){
  let div=document.getElementById("result");

  let p=round.players;

  div.innerHTML=`
  🥇🥈🥉 三人循環賽<br><br>
  ${p[0]} vs ${p[1]}<br>
  ${p[1]} vs ${p[2]}<br>
  ${p[0]} vs ${p[2]}
  `;
}
</script>

</body>
</html>
