<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>車庫大賽</title>

<style>
body{
  margin:0;
  background:#000;
  color:#fff;
  font-family:sans-serif;
  text-align:center;
}

h1{
  margin:20px;
  font-size:40px;
}

.controls{
  margin:10px;
}

textarea{
  width:80%;
  height:120px;
  border-radius:10px;
  padding:10px;
}

button,select{
  padding:10px;
  margin:5px;
  border-radius:10px;
  border:none;
}

.wrapper{
  width:100%;
  height:65vh;
  overflow:auto;
}

.canvas{
  position:relative;
  transform-origin:0 0;
}

/* 玩家框 */
.box{
  position:absolute;
  width:140px;
  height:44px;
  background:#1fa22e;
  border-radius:10px;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
}

.empty{
  background:#555;
}

.line{
  position:absolute;
  background:#fff;
}

.final{
  background:#ff9800;
}
</style>
</head>

<body>

<h1>🏆 車庫大賽</h1>

<div class="controls">
<select id="size">
  <option value="8">8人</option>
  <option value="16">16人</option>
  <option value="32">32人</option>
  <option value="48">48人（特殊賽制）</option>
  <option value="64">64人</option>
</select>

<button onclick="start()">開始</button>
<button onclick="undo()">撤回</button>
<button onclick="zoom(1.2)">放大</button>
<button onclick="zoom(0.8)">縮小</button>
</div>

<textarea id="players" placeholder="一行一個玩家"></textarea>

<div class="wrapper">
  <div id="canvas" class="canvas"></div>
</div>

<script>
let history=[];
let rounds=[];
let scale=1;

function start(){
  let size=parseInt(document.getElementById("size").value);
  let input=document.getElementById("players").value.trim().split("\n");

  while(input.length<size) input.push("玩家"+(input.length+1));

  rounds = generateRounds(input);
  history=[JSON.parse(JSON.stringify(rounds))];

  render();
}

function undo(){
  if(history.length>1){
    history.pop();
    rounds=JSON.parse(JSON.stringify(history[history.length-1]));
    render();
  }
}

function zoom(f){
  scale*=f;
  document.getElementById("canvas").style.transform=`scale(${scale})`;
}

/* 核心賽制 */
function generateRounds(players){
  let r=[];
  let current=[...players];

  while(current.length>3){
    let matches=[];

    for(let i=0;i<current.length;i+=2){
      matches.push({
        p1:current[i],
        p2:current[i+1],
        winner:null
      });
    }

    r.push(matches);
    current=new Array(matches.length).fill(null);
  }

  r.push({type:"final3", players:current});
  return r;
}

/* 點擊勝者 */
function pickWinner(r,i,player){
  rounds[r][i].winner=player;

  let next=rounds[r+1];

  if(next && !next.type){
    let idx=Math.floor(i/2);
    if(i%2===0) next[idx].p1=player;
    else next[idx].p2=player;
  }

  history.push(JSON.parse(JSON.stringify(rounds)));
  render();
}

/* 畫面 */
function render(){
  const canvas=document.getElementById("canvas");
  canvas.innerHTML="";

  let baseGap=70;
  let colWidth=200;

  canvas.style.width=colWidth*(rounds.length+2)+"px";
  canvas.style.height=baseGap*64+"px";

  rounds.forEach((round,r)=>{
    if(round.type==="final3"){
      drawFinal3(round.players);
      return;
    }

    let gap=baseGap*Math.pow(2,r);

    round.forEach((m,i)=>{
      let x=r*colWidth;
      let y=i*gap;

      drawBox(x,y,m.p1,()=>pickWinner(r,i,m.p1));
      drawBox(x,y+gap/2,m.p2,()=>pickWinner(r,i,m.p2));

      drawLine(x+140,y+22,40,2);
      drawLine(x+140,y+gap/2+22,40,2);
      drawLine(x+180,y+22,2,gap/2);
    });
  });
}

/* 玩家框 */
function drawBox(x,y,name,click){
  let d=document.createElement("div");
  d.className="box";
  d.style.left=x+"px";
  d.style.top=y+"px";

  if(!name){
    d.classList.add("empty");
    d.innerText="—";
  }else{
    d.innerText=name;
    d.onclick=click;
  }

  canvas.appendChild(d);
}

/* 線 */
function drawLine(x,y,w,h){
  let l=document.createElement("div");
  l.className="line";
  l.style.left=x+"px";
  l.style.top=y+"px";
  l.style.width=w+"px";
  l.style.height=h+"px";
  canvas.appendChild(l);
}

/* 三人循環賽 */
let finalResults=[];

function drawFinal3(players){
  let canvas=document.getElementById("canvas");

  let x=rounds.length*200;

  let matches=[
    [players[0],players[1]],
    [players[1],players[2]],
    [players[0],players[2]]
  ];

  matches.forEach((m,i)=>{
    let d=document.createElement("div");
    d.className="box final";
    d.style.left=x+"px";
    d.style.top=(i*80+100)+"px";
    d.innerText=`${m[0]||"?"} vs ${m[1]||"?"}`;

    d.onclick=()=>{
      let winner=prompt("輸入勝者");
      if(winner){
        finalResults.push(winner);
        if(finalResults.length===3){
          showRanking();
        }
      }
    };

    canvas.appendChild(d);
  });
}

/* 排名 */
function showRanking(){
  let score={};

  finalResults.forEach(p=>{
    score[p]=(score[p]||0)+1;
  });

  let rank=Object.entries(score)
    .sort((a,b)=>b[1]-a[1])
    .map(x=>x[0]);

  let canvas=document.getElementById("canvas");

  ["🥇"+rank[0],"🥈"+rank[1],"🥉"+rank[2]].forEach((t,i)=>{
    let d=document.createElement("div");
    d.className="box final";
    d.style.left=(rounds.length*200+200)+"px";
    d.style.top=(i*80+100)+"px";
    d.innerText=t;
    canvas.appendChild(d);
  });
}
</script>

</body>
</html>
