<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>車庫大賽</title>

<style>
body {
  background:#000;
  color:#fff;
  font-family:sans-serif;
  text-align:center;
}

textarea {
  width:90%;
  height:120px;
}

button {
  padding:10px 20px;
  margin:5px;
  border-radius:10px;
  border:none;
}

#wrap {
  position:relative;
  overflow:auto;
}

#bracket {
  position:relative;
  padding:40px;
  min-width:900px;
}

.player {
  position:absolute;
  width:120px;
  height:36px;
  line-height:36px;
  background:#1f8f2e;
  border-radius:6px;
  cursor:pointer;
}

.player:hover {
  background:#27c93f;
}

.winner {
  background:gold;
  color:black;
}

svg {
  position:absolute;
  top:0;
  left:0;
  pointer-events:none;
}

#result {
  margin-top:20px;
  font-size:20px;
}
</style>
</head>

<body>

<h1>🏆 車庫大賽</h1>

<textarea id="players">
玩家1
玩家2
玩家3
玩家4
玩家5
玩家6
玩家7
玩家8
</textarea><br>

<button onclick="start()">開始</button>
<button onclick="undo()">撤回</button>

<div id="wrap">
  <div id="bracket"></div>
  <svg id="lines"></svg>
</div>

<div id="result"></div>

<script>
let rounds = [];
let history = [];
let semiLosers = [];
let thirdMatch = ["",""];

const BOX_W = 120;
const BOX_H = 36;
const GAP_Y = 20;
const ROUND_GAP = 180;

function start() {
  let players = document.getElementById("players").value
    .split("\n")
    .map(p=>p.trim())
    .filter(p=>p);

  if (players.length < 2) return;

  players = shuffle(players);

  rounds = [players];
  history = [];
  semiLosers = [];
  thirdMatch = ["",""];

  let n = players.length;
  while (n > 1) {
    n = n / 2;
    rounds.push(new Array(n).fill(""));
  }

  render();
}

function render() {
  const bracket = document.getElementById("bracket");
  const svg = document.getElementById("lines");

  bracket.innerHTML = "";
  svg.innerHTML = "";

  let totalHeight = calcHeight(rounds[0].length);

  svg.setAttribute("width", 2000);
  svg.setAttribute("height", totalHeight);

  rounds.forEach((round, r)=>{
    for (let i=0;i<round.length;i++){
      let x = r * ROUND_GAP;
      let spacing = Math.pow(2, r)*(BOX_H+GAP_Y);
      let y = i * spacing + spacing/2;

      let div = document.createElement("div");
      div.className="player";
      div.style.left = x + "px";
      div.style.top = y + "px";
      div.innerText = round[i] || "-";

      if (round[i]) {
        div.onclick = ()=>{
          history.push(JSON.stringify({
            rounds,
            semiLosers,
            thirdMatch
          }));

          let winner = round[i];
          let loser = round[i%2===0 ? i+1 : i-1];

          rounds[r+1][Math.floor(i/2)] = winner;

          // ⭐ 四強敗者
          if (r === rounds.length-3) {
            semiLosers.push(loser);
            if (semiLosers.length===2){
              thirdMatch = [...semiLosers];
            }
          }

          render();
        };
      }

      bracket.appendChild(div);

      // 畫線
      if (r < rounds.length-1) {
        let nextX = (r+1)*ROUND_GAP;
        let nextIndex = Math.floor(i/2);
        let nextSpacing = Math.pow(2,r+1)*(BOX_H+GAP_Y);
        let nextY = nextIndex*nextSpacing + nextSpacing/2;

        drawLine(svg, x+BOX_W, y+BOX_H/2, nextX, nextY+BOX_H/2);
      }
    }
  });

  // 🥉 季軍戰
  if (thirdMatch[0] && thirdMatch[1]) {
    let r = rounds.length;

    thirdMatch.forEach((name,i)=>{
      let x = r * ROUND_GAP;
      let y = i*120 + 100;

      let div = document.createElement("div");
      div.className="player";
      div.style.left = x+"px";
      div.style.top = y+"px";
      div.innerText = name;

      div.onclick = ()=>{
        updateResult(name);
      };

      bracket.appendChild(div);
    });
  }

  updateResult();
}

function updateResult(thirdWinner=null){
  let final = rounds[rounds.length-1];

  if (!final[0]) return;

  let champion = final[0];
  let runner = rounds[rounds.length-2].find(p=>p && p!==champion);

  let html = `
    🥇 冠軍：${champion}<br>
    🥈 亞軍：${runner}
  `;

  if (thirdWinner){
    html += `<br>🥉 季軍：${thirdWinner}`;
  }

  document.getElementById("result").innerHTML = html;
}

function drawLine(svg,x1,y1,x2,y2){
  let path = document.createElementNS("http://www.w3.org/2000/svg","path");

  let midX = (x1+x2)/2;

  let d = `
    M ${x1} ${y1}
    L ${midX} ${y1}
    L ${midX} ${y2}
    L ${x2} ${y2}
  `;

  path.setAttribute("d",d);
  path.setAttribute("stroke","white");
  path.setAttribute("fill","none");
  path.setAttribute("stroke-width","2");

  svg.appendChild(path);
}

function undo(){
  if (!history.length) return;
  let state = JSON.parse(history.pop());
  rounds = state.rounds;
  semiLosers = state.semiLosers;
  thirdMatch = state.thirdMatch;
  render();
}

function calcHeight(n){
  return n*(BOX_H+GAP_Y)*2;
}

function shuffle(arr){
  for (let i=arr.length-1;i>0;i--){
    let j=Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]]=[arr[j],arr[i]];
  }
  return arr;
}
</script>

</body>
</html>
