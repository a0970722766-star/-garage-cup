<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>車庫大賽 穩定版</title>

<style>
body{margin:0;background:#000;color:#fff;font-family:sans-serif;}
h1{text-align:center;margin:20px;}
textarea{width:90%;height:120px;margin:auto;display:block;border-radius:10px;}
.controls{text-align:center;margin:10px;}
button,select{padding:8px;border-radius:8px;margin:5px;}

#view{overflow:auto;height:70vh;}
#bracket{position:relative;transform-origin:0 0;}
.match{position:absolute;}

.player{
  background:#2ecc71;
  padding:10px;
  margin:5px 0;
  border-radius:10px;
  cursor:pointer;
  width:140px;
  text-align:center;
}

.win{background:#00c853;}
.lose{background:#444;}

svg{position:absolute;top:0;left:0;}
</style>
</head>

<body>

<h1>🏆 車庫大賽</h1>

<div class="controls">
<select id="mode">
<option value="8">8</option>
<option value="16">16</option>
<option value="32">32</option>
<option value="48">48</option>
<option value="64">64</option>
</select>

<button onclick="start()">開始</button>
<button onclick="undo()">撤回</button>
</div>

<textarea id="input">玩家1
玩家2
玩家3
玩家4
玩家5
玩家6
玩家7
玩家8</textarea>

<div id="view">
  <div id="bracket"></div>
  <svg id="lines"></svg>
</div>

<div id="result" style="text-align:center;margin:20px;"></div>

<script>
window.start = function(){

  const input = document.getElementById("input");
  const bracket = document.getElementById("bracket");

  let names = input.value.split("\n").filter(x=>x.trim());

  if(names.length < 2){
    alert("至少2人");
    return;
  }

  bracket.innerHTML="";

  names.forEach((n,i)=>{
    let div=document.createElement("div");
    div.className="player";
    div.innerText=n;
    div.style.position="absolute";
    div.style.left="50px";
    div.style.top=(i*60)+"px";
    bracket.appendChild(div);
  });

  console.log("start OK");
}

window.undo = function(){
  alert("撤回測試OK");
}
</script>

</body>
</html>
