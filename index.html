<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>車庫大賽 Pro 最終版</title>

<style>
body{
  margin:0;
  background:#000;
  color:#fff;
  text-align:center;
  font-family:sans-serif;
}

textarea{
  width:90%;
  height:120px;
  margin:10px;
  border-radius:10px;
}

button,select{
  padding:8px;
  margin:5px;
  border-radius:8px;
  border:none;
}

#view{
  overflow:auto;
  height:90vh;
  border-top:1px solid #333;
  white-space:nowrap;
}

#stage{
  position:relative;
  width:max-content;
}

#lines{
  position:absolute;
  top:0;
  left:0;
  z-index:0;
}

#bracket{
  position:absolute;
  top:0;
  left:0;
  z-index:1;
}

.match{
  position:absolute;
}

.player{
  width:140px;
  padding:8px;
  margin:4px 0;
  border-radius:8px;
  background:#2ecc71;
  cursor:pointer;
}

.win{background:#00c853;}
.lose{background:#444;}
</style>
</head>

<body>

<h1>🏆 車庫大賽</h1>

<select id="mode">
<option value="8">8人</option>
<option value="16">16人</option>
<option value="32">32人</option>
<option value="64">64人</option>
</select>

<br>

<button onclick="start()">開始</button>
<button onclick="undo()">撤回</button>

<textarea id="input">玩家1
玩家2
玩家3
玩家4
玩家5
玩家6
玩家7
玩家8</textarea>

<div id="view">
  <div id="stage">
    <svg id="lines"></svg>
    <div id="bracket"></div>
  </div>
</div>

<script>

let rounds=[];
let history=[];

function start(){

  let names=document.getElementById("input").value
    .split("\n")
    .map(x=>x.trim())
    .filter(x=>x);

  let size=parseInt(document.getElementById("mode").value);

  while(names.length<size){
    names.push("玩家"+(names.length+1));
  }

  rounds=[];
  history=[];

  let cur=[...names];

  while(cur.length>1){
    let r=[];
    let next=[];

    for(let i=0;i<cur.length;i+=2){
      r.push({p1:cur[i],p2:cur[i+1]||"",winner:null});
      next.push(null);
    }

    rounds.push(r);
    cur=next;
  }

  render();
}

function render(){

  let stage=document.getElementById("stage");
  let bracket=document.getElementById("bracket");
  let svg=document.getElementById("lines");

  bracket.innerHTML="";
  svg.innerHTML="";

  let colW=260;
  let rowH=90;

  rounds.forEach((round,ri)=>{

    let gap=Math.pow(2,ri);

    round.forEach((m,mi)=>{

      let x=ri*colW;
      let y=mi*rowH*gap + (rowH*gap/2 - rowH/2);

      let div=document.createElement("div");
      div.className="match";
      div.style.left=x+"px";
      div.style.top=y+"px";

      div.appendChild(makePlayer(m,"p1"));
      div.appendChild(makePlayer(m,"p2"));

      bracket.appendChild(div);

    });

  });

  // 畫布尺寸
  let width=rounds.length*colW;
  let height=bracket.scrollHeight;

  stage.style.width=width+"px";
  stage.style.height=height+"px";

  svg.setAttribute("width",width);
  svg.setAttribute("height",height);

  // ⭐ 關鍵：等 DOM 完成再畫線
  requestAnimationFrame(drawLines);
}

function drawLines(){

  let svg=document.getElementById("lines");
  let bracket=document.getElementById("bracket");

  svg.innerHTML="";

  let matches=document.querySelectorAll(".match");

  matches.forEach(div=>{

    let x=parseInt(div.style.left);
    let ri=x/260;

    if(ri===0) return;

    let p1=div.children[0];
    let p2=div.children[1];

    let r1=p1.getBoundingClientRect();
    let r2=p2.getBoundingClientRect();
    let container=bracket.getBoundingClientRect();

    let y1=r1.top+r1.height/2-container.top;
    let y2=r2.top+r2.height/2-container.top;

    let playerW=r1.width;

    drawLine(
      x-260+playerW,
      y1,
      x-playerW/2,
      y2
    );

  });

}

function makePlayer(m,key){

  let d=document.createElement("div");
  d.className="player";

  let name=m[key]||"";
  d.innerText=name;

  if(m.winner){
    if(name===m.winner)d.classList.add("win");
    else d.classList.add("lose");
  }

  d.onclick=function(){
    if(!name)return;

    m.winner=name;
    history.push(m);

    propagate();
    render();
  };

  return d;
}

function propagate(){

  for(let i=0;i<rounds.length-1;i++){

    let r=rounds[i];
    let n=rounds[i+1];

    r.forEach((m,mi)=>{
      if(m.winner){
        let idx=Math.floor(mi/2);
        let slot=mi%2===0?"p1":"p2";
        n[idx][slot]=m.winner;
      }
    });

  }
}

function drawLine(x1,y1,x2,y2){

  let p=document.createElementNS("http://www.w3.org/2000/svg","path");

  p.setAttribute("d",
    `M${x1} ${y1} H${x2-20} V${y2} H${x2}`
  );

  p.setAttribute("stroke","#fff");
  p.setAttribute("stroke-width","2");
  p.setAttribute("fill","none");

  document.getElementById("lines").appendChild(p);
}

function undo(){
  let m=history.pop();
  if(!m)return;

  m.winner=null;
  propagate();
  render();
}

</script>

</body>
</html>
