<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>車庫大賽</title>

<style>
body {
  font-family: sans-serif;
  background: #000;
  color: #fff;
  text-align: center;
}

textarea {
  width: 90%;
  max-width: 400px;
  height: 150px;
  margin: 20px;
}

button {
  padding: 10px 20px;
  margin: 10px;
  font-size: 16px;
  border-radius: 10px;
}

#bracket {
  display: flex;
  gap: 60px;
  overflow-x: auto;
  padding: 20px;
  align-items: center;
}

.round {
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 40px;
  position: relative;
}

.match {
  display: flex;
  flex-direction: column;
  gap: 10px;
  position: relative;
  align-items: center;
}

/* 玩家 */
.player {
  background: green;
  padding: 12px 20px;
  cursor: pointer;
  border-radius: 8px;
  min-width: 100px;
  text-align: center;
  font-size: clamp(12px, 2vw, 16px);
}

.player:hover {
  background: limegreen;
}

.winner {
  background: gold !important;
  color: black;
}

/* 橫線 */
.match::after {
  content: "";
  position: absolute;
  right: -30px;
  top: 50%;
  width: 30px;
  height: 2px;
  background: white;
}

/* 直線 */
.match::before {
  content: "";
  position: absolute;
  right: -30px;
  top: 0;
  width: 2px;
  height: 100%;
  background: white;
}

/* 最後一輪不要線 */
.round:last-child .match::before,
.round:last-child .match::after {
  display: none;
}
</style>
</head>

<body>

<h1>🏆 車庫大賽</h1>

<textarea id="players">
玩家1
玩家2
玩家3
玩家4
玩家5
玩家6
玩家7
玩家8
</textarea>

<br>

<button onclick="start()">開始</button>
<button onclick="reset()">撤回</button>

<div id="bracket"></div>

<script>
let rounds = [];
let currentRound = 0;

function start() {
  let players = document.getElementById("players").value
    .split("\n")
    .map(p => p.trim())
    .filter(p => p !== "");

  if (players.length < 2) return alert("至少2人");

  players = shuffle(players);

  if (players.length % 2 !== 0) players.push("輪空");

  rounds = [players];
  currentRound = 0;

  render();
}

function render() {
  let container = document.getElementById("bracket");
  container.innerHTML = "";

  rounds.forEach((roundPlayers, roundIndex) => {
    let roundDiv = document.createElement("div");
    roundDiv.className = "round";

    let title = document.createElement("h3");
    title.innerText = "第 " + (roundIndex + 1) + " 輪";
    roundDiv.appendChild(title);

    for (let i = 0; i < roundPlayers.length; i += 2) {
      let p1 = roundPlayers[i];
      let p2 = roundPlayers[i + 1];

      let match = document.createElement("div");
      match.className = "match";

      let btn1 = createPlayer(p1, roundIndex, i);
      let btn2 = createPlayer(p2, roundIndex, i + 1);

      match.appendChild(btn1);
      match.appendChild(btn2);

      roundDiv.appendChild(match);
    }

    container.appendChild(roundDiv);
  });
}

function createPlayer(name, roundIndex, playerIndex) {
  let btn = document.createElement("div");
  btn.className = "player";
  btn.innerText = name;

  btn.onclick = () => {
    if (roundIndex !== currentRound) return;

    let next = rounds[roundIndex + 1] || [];
    next[Math.floor(playerIndex / 2)] = name;
    rounds[roundIndex + 1] = next;

    btn.classList.add("winner");

    if (next.filter(Boolean).length === rounds[roundIndex].length / 2) {
      currentRound++;
    }

    render();
  };

  return btn;
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    let j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function reset() {
  document.getElementById("bracket").innerHTML = "";
  rounds = [];
  currentRound = 0;
}
</script>

</body>
</html>
