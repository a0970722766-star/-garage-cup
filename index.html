<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>車庫大賽</title>

<style>
body {
  background:#000;
  color:#fff;
  font-family:sans-serif;
  text-align:center;
}

textarea {
  width:90%;
  height:120px;
}

button {
  padding:10px 20px;
  margin:10px;
  border-radius:10px;
  border:none;
}

#bracket {
  display:flex;
  overflow-x:auto;
  padding:20px;
  align-items:center;
}

.round {
  display:flex;
  flex-direction:column;
  justify-content:space-around;
  margin:0 30px;
}

.match {
  position:relative;
  margin:25px 0;
}

.player {
  background:#1f8f2e;
  margin:6px 0;
  padding:10px;
  border-radius:8px;
  cursor:pointer;
  transition:0.2s;
}

.player:hover {
  background:#27c93f;
}

.winner {
  background:gold;
  color:black;
}

.connector {
  position:absolute;
  right:-30px;
  top:50%;
  width:30px;
  height:2px;
  background:white;
}

.vertical {
  position:absolute;
  right:-30px;
  width:2px;
  background:white;
}

#result {
  margin-top:20px;
  font-size:20px;
}
</style>
</head>

<body>

<h1>🏆 車庫大賽</h1>

<textarea id="players">
玩家1
玩家2
玩家3
玩家4
玩家5
玩家6
玩家7
玩家8
</textarea>

<br>

<button onclick="start()">開始</button>
<button onclick="undo()">撤回</button>

<div id="bracket"></div>

<div id="result"></div>

<script>
let rounds = [];
let history = [];

function start() {
  let players = document.getElementById("players").value
    .split("\n")
    .map(p=>p.trim())
    .filter(p=>p);

  players = shuffle(players);

  rounds = [players];
  history = [];

  buildNextRounds(players.length);
  render();
}

function buildNextRounds(n) {
  while (n > 1) {
    n = Math.ceil(n/2);
    rounds.push(new Array(n).fill(null));
  }
}

function render() {
  let bracket = document.getElementById("bracket");
  bracket.innerHTML = "";

  rounds.forEach((round, rIndex)=>{
    let roundDiv = document.createElement("div");
    roundDiv.className = "round";

    let title = document.createElement("h3");
    title.innerText = "第 " + (rIndex+1) + " 輪";
    roundDiv.appendChild(title);

    for (let i=0;i<round.length;i+=2) {
      let match = document.createElement("div");
      match.className="match";

      let p1 = createPlayer(round[i], rIndex, i);
      let p2 = createPlayer(round[i+1], rIndex, i+1);

      match.appendChild(p1);
      match.appendChild(p2);

      // 畫橫線
      let line = document.createElement("div");
      line.className="connector";
      match.appendChild(line);

      roundDiv.appendChild(match);
    }

    bracket.appendChild(roundDiv);
  });

  checkResult();
}

function createPlayer(name, r, i) {
  let div = document.createElement("div");
  div.className="player";
  div.innerText = name || "-";

  if (!name) return div;

  div.onclick = ()=>{
    history.push(JSON.stringify(rounds));

    let nextIndex = Math.floor(i/2);
    rounds[r+1][nextIndex] = name;

    render();
  };

  return div;
}

function checkResult() {
  let last = rounds[rounds.length-1];

  if (last[0]) {
    let champion = last[0];

    let semi = rounds[rounds.length-2];

    let runnerUp = semi.find(p=>p && p!==champion);

    let thirdRound = rounds[rounds.length-3] || [];
    let third = thirdRound.find(p=>p && p!==champion && p!==runnerUp);

    document.getElementById("result").innerHTML = `
      🥇 冠軍：${champion}<br>
      🥈 亞軍：${runnerUp || "-"}<br>
      🥉 季軍：${third || "-"}
    `;
  }
}

function undo() {
  if (history.length===0) return;

  rounds = JSON.parse(history.pop());
  render();
}

function shuffle(arr) {
  for (let i=arr.length-1;i>0;i--) {
    let j=Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]]=[arr[j],arr[i]];
  }
  return arr;
}
</script>

</body>
</html>
