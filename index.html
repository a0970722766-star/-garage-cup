<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>車庫大賽</title>

<style>
body{background:#000;color:#fff;text-align:center;font-family:sans-serif;}
textarea{width:90%;height:120px;margin:10px;border-radius:10px;}
button{padding:10px;margin:5px;border-radius:10px;border:none;}

.match{margin:10px;}
.player{
  display:inline-block;
  padding:10px 20px;
  margin:5px;
  background:#2ecc71;
  border-radius:10px;
  cursor:pointer;
}
.win{background:#00c853;}
.lose{background:#444;}
</style>
</head>

<body>

<h1>🏆 車庫大賽</h1>

<button id="start">開始</button>

<br>

<textarea id="players">玩家1
玩家2
玩家3
玩家4
玩家5
玩家6
玩家7
玩家8</textarea>

<div id="game"></div>

<script>
const startBtn = document.getElementById("start");
const game = document.getElementById("game");

startBtn.addEventListener("click", function(){

  let text = document.getElementById("players").value;
  let list = text.split("\n").filter(x=>x.trim());

  game.innerHTML="";

  for(let i=0;i<list.length;i+=2){

    let div = document.createElement("div");
    div.className="match";

    let p1 = createPlayer(list[i]);
    let p2 = createPlayer(list[i+1]);

    div.appendChild(p1);
    div.appendChild(p2);

    game.appendChild(div);
  }

});

function createPlayer(name){

  let div = document.createElement("div");
  div.className="player";
  div.innerText = name || "空";

  div.onclick = function(){
    let parent = div.parentElement;

    [...parent.children].forEach(x=>{
      x.classList.remove("win");
      x.classList.remove("lose");
      x.classList.add("lose");
    });

    div.classList.remove("lose");
    div.classList.add("win");
  };

  return div;
}
</script>

</body>
</html>
