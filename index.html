<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>車庫大賽</title>

<style>
body{margin:0;background:#000;color:#fff;font-family:sans-serif;text-align:center;overflow:hidden;}
#viewport{width:100vw;height:80vh;overflow:hidden;touch-action:none;position:relative;}
#stage{position:absolute;transform-origin:0 0;}
.node{
  position:absolute;
  width:130px;height:40px;
  background:#1fae2f;border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;
}
.node:hover{background:#28d943;}
.winner{background:gold;color:#000;}
svg{position:absolute;top:0;left:0;pointer-events:none;}
button{margin:10px;padding:10px 20px;border-radius:10px;border:none;}
</style>
</head>

<body>

<h2>🏆 車庫大賽</h2>
<button onclick="start()">開始</button>
<button onclick="undo()">撤回</button>

<div id="viewport">
  <div id="stage">
    <svg id="lines"></svg>
    <div id="nodes"></div>
  </div>
</div>

<div id="result"></div>

<script>
let rounds=[],history=[],semiLosers=[],thirdMatch=["",""];

const BOX_W=130, BOX_H=40, GAP_X=180, GAP_Y=20;

function start(){
  let players=["玩家1","玩家2","玩家3","玩家4","玩家5","玩家6","玩家7","玩家8"];
  rounds=[players];
  history=[];semiLosers=[];thirdMatch=["",""];

  let n=players.length;
  while(n>1){n/=2;rounds.push(new Array(n).fill(""));}

  render();
}

function render(){
  const nodes=document.getElementById("nodes");
  const svg=document.getElementById("lines");
  nodes.innerHTML=""; svg.innerHTML="";

  rounds.forEach((round,r)=>{
    round.forEach((p,i)=>{
      let x=r*GAP_X;
      let spacing=Math.pow(2,r)*(BOX_H+GAP_Y);
      let y=i*spacing+spacing/2;

      let div=document.createElement("div");
      div.className="node";
      div.style.left=x+"px";
      div.style.top=y+"px";
      div.innerText=p||"-";

      if(p){
        div.onclick=()=>{
          history.push(JSON.stringify({rounds,semiLosers,thirdMatch}));

          let winner=p;
          let loser=round[i%2===0?i+1:i-1];

          rounds[r+1][Math.floor(i/2)]=winner;

          if(r===rounds.length-3){
            semiLosers.push(loser);
            if(semiLosers.length===2) thirdMatch=[...semiLosers];
          }

          render();
        };
      }

      nodes.appendChild(div);

      if(r<rounds.length-1){
        let nextX=(r+1)*GAP_X;
        let nextIndex=Math.floor(i/2);
        let nextSpacing=Math.pow(2,r+1)*(BOX_H+GAP_Y);
        let nextY=nextIndex*nextSpacing+nextSpacing/2;

        draw(svg,x+BOX_W,y+BOX_H/2,nextX,nextY+BOX_H/2);
      }
    });
  });

  // 季軍賽
  if(thirdMatch[0]&&thirdMatch[1]){
    let r=rounds.length;
    thirdMatch.forEach((p,i)=>{
      let x=r*GAP_X;
      let y=200+i*120;

      let div=document.createElement("div");
      div.className="node";
      div.style.left=x+"px";
      div.style.top=y+"px";
      div.innerText=p;

      div.onclick=()=>updateResult(p);

      nodes.appendChild(div);
    });
  }

  updateResult();
}

function draw(svg,x1,y1,x2,y2){
  let path=document.createElementNS("http://www.w3.org/2000/svg","path");
  let mid=(x1+x2)/2;
  let d=`M${x1},${y1} L${mid},${y1} L${mid},${y2} L${x2},${y2}`;
  path.setAttribute("d",d);
  path.setAttribute("stroke","white");
  path.setAttribute("fill","none");
  path.setAttribute("stroke-width","2");
  svg.appendChild(path);
}

function updateResult(third=null){
  let final=rounds[rounds.length-1];
  if(!final[0]) return;

  let champ=final[0];
  let runner=rounds[rounds.length-2].find(p=>p&&p!==champ);

  let html=`🥇 ${champ}<br>🥈 ${runner}`;
  if(third) html+=`<br>🥉 ${third}`;
  document.getElementById("result").innerHTML=html;
}

function undo(){
  if(!history.length)return;
  let s=JSON.parse(history.pop());
  rounds=s.rounds;semiLosers=s.semiLosers;thirdMatch=s.thirdMatch;
  render();
}

/* 🔥 拖動+縮放 */
let scale=1,pos={x:0,y:0},drag=false,startPos={};
const stage=document.getElementById("stage"),vp=document.getElementById("viewport");

vp.addEventListener("touchstart",e=>{
  if(e.touches.length===1){
    drag=true;
    startPos.x=e.touches[0].clientX-pos.x;
    startPos.y=e.touches[0].clientY-pos.y;
  }
});

vp.addEventListener("touchmove",e=>{
  if(e.touches.length===1&&drag){
    pos.x=e.touches[0].clientX-startPos.x;
    pos.y=e.touches[0].clientY-startPos.y;
    updateTransform();
  }
});

let last=0;
vp.addEventListener("touchmove",e=>{
  if(e.touches.length===2){
    let dx=e.touches[0].clientX-e.touches[1].clientX;
    let dy=e.touches[0].clientY-e.touches[1].clientY;
    let d=Math.sqrt(dx*dx+dy*dy);
    if(last){scale*=d/last;scale=Math.max(.5,Math.min(2.5,scale));updateTransform();}
    last=d;
  }
});

vp.addEventListener("touchend",()=>{drag=false;last=0;});

function updateTransform(){
  stage.style.transform=`translate(${pos.x}px,${pos.y}px) scale(${scale})`;
}
</script>

</body>
</html>
