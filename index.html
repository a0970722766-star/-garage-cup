<script>
document.getElementById("startBtn").addEventListener("click", start);

let rounds=[];
let history=[];

function start(){

  const input=document.getElementById("input").value;

  let names=input.split("\n").map(x=>x.trim()).filter(x=>x);

  let size=parseInt(document.getElementById("mode").value);

  while(names.length<size){
    names.push("玩家"+(names.length+1));
  }

  rounds=[];
  history=[];

  let cur=[...names];

  while(cur.length>1){
    let r=[];
    let next=[];

    for(let i=0;i<cur.length;i+=2){
      r.push({p1:cur[i],p2:cur[i+1],winner:null});
      next.push(null);
    }

    rounds.push(r);
    cur=next;
  }

  render();
}

function render(){

  const bracket=document.getElementById("bracket");
  const lines=document.getElementById("lines");

  bracket.innerHTML="";
  lines.innerHTML="";

  let colW=200;
  let rowH=70;

  rounds.forEach((round,ri)=>{
    round.forEach((m,mi)=>{

      let x = ri * colW;
      let y = mi * rowH * Math.pow(2, ri);

      let div=document.createElement("div");
      div.className="match";
      div.style.left=x+"px";
      div.style.top=y+"px";

      div.appendChild(player(m,"p1"));
      div.appendChild(player(m,"p2"));

      bracket.appendChild(div);

      if(ri>0){
        let prev=Math.floor(mi/2);

        drawLine(
          x-60,
          prev * rowH * Math.pow(2, ri-1) + 20,
          x,
          y+20
        );
      }
    });
  });

  bracket.style.width=(rounds.length * 220)+"px";
  bracket.style.height="2000px";
}
</script>
