<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>車庫大賽</title>

<style>
body{
  margin:0;
  background:#000;
  color:#fff;
  font-family:sans-serif;
  text-align:center;
}

h1{margin:20px;}

textarea{
  width:80%;
  height:120px;
  border-radius:10px;
  padding:10px;
}

button,select{
  padding:10px;
  margin:5px;
  border-radius:10px;
  border:none;
}

.wrapper{
  height:65vh;
  overflow:auto;
}

.canvas{
  position:relative;
  transform-origin:0 0;
}

.box{
  position:absolute;
  width:140px;
  height:44px;
  background:#1fa22e;
  border-radius:10px;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
}

.empty{background:#555;}
.line{position:absolute;background:#fff;}
.final{background:#ff9800;}
</style>
</head>

<body>

<h1>🏆 車庫大賽</h1>

<select id="size">
<option value="8">8人</option>
<option value="16">16人</option>
<option value="32">32人</option>
<option value="48">48人（特殊賽制）</option>
<option value="64">64人</option>
</select>

<button onclick="start()">開始</button>
<button onclick="undo()">撤回</button>
<button onclick="zoom(1.2)">放大</button>
<button onclick="zoom(0.8)">縮小</button>

<br><br>

<textarea id="players" placeholder="一行一個玩家"></textarea>

<div class="wrapper">
<div id="canvas" class="canvas"></div>
</div>

<script>

let rounds=[];
let history=[];
let scale=1;
let final3Results=[];

function start(){
  let size=parseInt(sizeSelect.value);
  let input=players.value.trim().split("\n");

  while(input.length<size){
    input.push("玩家"+(input.length+1));
  }

  rounds = generateRounds(input);
  history=[JSON.parse(JSON.stringify(rounds))];
  final3Results=[];

  render();
}

function undo(){
  if(history.length>1){
    history.pop();
    rounds=JSON.parse(JSON.stringify(history[history.length-1]));
    render();
  }
}

function zoom(f){
  scale*=f;
  canvas.style.transform=`scale(${scale})`;
}

/* 核心賽制 */
function generateRounds(players){
  let r=[];
  let current=[...players];
  let is48 = players.length===48;

  while(true){

    if(is48 && current.length===3){
      r.push({type:"final3",players:current});
      break;
    }

    if(!is48 && current.length===1){
      break;
    }

    let matches=[];

    for(let i=0;i<current.length;i+=2){
      matches.push({
        p1:current[i],
        p2:current[i+1],
        winner:null,
        loser:null
      });
    }

    r.push(matches);
    current=new Array(matches.length).fill(null);
  }

  return r;
}

/* 點擊勝者 */
function pickWinner(r,i,player){
  let m=rounds[r][i];
  m.winner=player;
  m.loser=(m.p1===player)?m.p2:m.p1;

  let next=rounds[r+1];

  if(next && !next.type){
    let idx=Math.floor(i/2);
    if(i%2===0) next[idx].p1=player;
    else next[idx].p2=player;
  }

  history.push(JSON.parse(JSON.stringify(rounds)));
  render();
}

/* 畫面 */
function render(){
  canvas.innerHTML="";

  let baseGap=70;
  let colWidth=200;

  canvas.style.width=(rounds.length+3)*colWidth+"px";
  canvas.style.height="4000px";

  rounds.forEach((round,r)=>{

    if(round.type==="final3"){
      drawFinal3(round.players,r);
      return;
    }

    let gap=baseGap*Math.pow(2,r);

    round.forEach((m,i)=>{

      let x=r*colWidth;
      let y=i*gap;

      drawBox(x,y,m.p1,()=>pickWinner(r,i,m.p1));
      drawBox(x,y+gap/2,m.p2,()=>pickWinner(r,i,m.p2));

      drawLine(x+140,y+22,40,2);
      drawLine(x+140,y+gap/2+22,40,2);
      drawLine(x+180,y+22,2,gap/2);
    });

  });

  drawFinalRanking();
}

/* 玩家框 */
function drawBox(x,y,name,click){
  let d=document.createElement("div");
  d.className="box";
  d.style.left=x+"px";
  d.style.top=y+"px";

  if(name===null || name===undefined){
    d.classList.add("empty");
    d.innerText="—";
  }else{
    d.innerText=name;
    d.onclick=click;
  }

  canvas.appendChild(d);
}

/* 線 */
function drawLine(x,y,w,h){
  let l=document.createElement("div");
  l.className="line";
  l.style.left=x+"px";
  l.style.top=y+"px";
  l.style.width=w+"px";
  l.style.height=h+"px";
  canvas.appendChild(l);
}

/* ===== 48人最終循環 ===== */
function drawFinal3(players,r){
  let x=r*200;

  let match=[
    [players[0],players[1]],
    [players[1],players[2]],
    [players[0],players[2]]
  ];

  match.forEach((m,i)=>{
    let d=document.createElement("div");
    d.className="box final";
    d.style.left=x+"px";
    d.style.top=(i*80+100)+"px";
    d.innerText=`${m[0]} vs ${m[1]}`;

    d.onclick=()=>{
      let winner=m[0]===d.innerText.split(" vs ")[0]?m[0]:m[1];
      final3Results.push(winner);
      if(final3Results.length===3){
        calcFinal3();
      }
    };

    canvas.appendChild(d);
  });
}

function calcFinal3(){
  let score={};
  final3Results.forEach(p=>{
    score[p]=(score[p]||0)+1;
  });

  let rank=Object.entries(score)
    .sort((a,b)=>b[1]-a[1])
    .map(x=>x[0]);

  showRank(rank);
}

/* ===== 正常賽制排名 ===== */
function drawFinalRanking(){
  let last=rounds[rounds.length-1];

  if(last.type==="final3") return;

  let finalMatch=rounds[rounds.length-1][0];

  if(!finalMatch.winner) return;

  let semi=rounds[rounds.length-2];

  let thirdPlayers=[
    semi[0].loser,
    semi[1].loser
  ];

  let x=rounds.length*200;

  createRank("🥇 "+finalMatch.winner,0,x);
  createRank("🥈 "+finalMatch.loser,1,x);

  let d=createRank(`${thirdPlayers[0]} vs ${thirdPlayers[1]}`,2,x);

  d.onclick=()=>{
    let winner=thirdPlayers[0];
    d.innerText="🥉 "+winner;
  };
}

function createRank(text,i,x){
  let d=document.createElement("div");
  d.className="box final";
  d.style.left=x+"px";
  d.style.top=(i*80+100)+"px";
  d.innerText=text;
  canvas.appendChild(d);
  return d;
}

function showRank(rank){
  let x=rounds.length*200;

  ["🥇"+rank[0],"🥈"+rank[1],"🥉"+rank[2]].forEach((t,i)=>{
    createRank(t,i,x);
  });
}

</script>

</body>
</html>
