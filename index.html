<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>車庫大賽 完整版</title>

<style>
body{
  margin:0;
  background:#000;
  color:#fff;
  text-align:center;
  font-family:sans-serif;
}

textarea{
  width:90%;
  height:120px;
  margin:10px;
  border-radius:10px;
}

button,select{
  padding:8px;
  margin:5px;
  border-radius:8px;
  border:none;
}

/* 🔥 可縮放區 */
#stageWrapper{
  height:80vh;
  overflow:hidden;
  touch-action:none;
}

#stage{
  transform-origin: top left;
}

/* 右上結果 */
#resultBox{
  position:absolute;
  right:20px;
  top:80px;
  text-align:left;
  font-size:18px;
  line-height:1.8;
}

/* 排列 */
#bracket{
  display:flex;
  align-items:flex-start;
  padding:20px;
}

.round{
  display:flex;
  flex-direction:column;
  margin:0 40px;
}

.match{
  display:flex;
  flex-direction:column;
  align-items:center;
  margin-bottom:40px;
}

.player{
  width:140px;
  height:36px;
  line-height:36px;
  margin:4px 0;
  border-radius:8px;
  background:#2ecc71;
  cursor:pointer;
}

.win{background:#00c853;}
.lose{background:#444;}
</style>
</head>

<body>

<h1>🏆 車庫大賽</h1>

<div id="resultBox"></div>

<select id="mode">
<option value="8">8人</option>
<option value="16">16人</option>
<option value="32">32人</option>
<option value="64">64人</option>
</select>

<br>

<button onclick="start()">開始</button>
<button onclick="undo()">撤回</button>

<textarea id="input">玩家1
玩家2
玩家3
玩家4
玩家5
玩家6
玩家7
玩家8</textarea>

<div id="stageWrapper">
  <div id="stage">
    <div id="bracket"></div>
  </div>
</div>

<script>

let rounds=[];
let history=[];
let thirdMatch={p1:null,p2:null,winner:null};

/* ===== 開始 ===== */
function start(){

  let names=document.getElementById("input").value
    .split("\n")
    .map(x=>x.trim())
    .filter(x=>x);

  let size=parseInt(document.getElementById("mode").value);

  while(names.length<size){
    names.push("玩家"+(names.length+1));
  }

  rounds=[];
  history=[];
  thirdMatch={p1:null,p2:null,winner:null};

  let cur=[...names];

  while(cur.length>1){
    let r=[];
    let next=[];

    for(let i=0;i<cur.length;i+=2){
      r.push({p1:cur[i],p2:cur[i+1],winner:null});
      next.push(null);
    }

    rounds.push(r);
    cur=next;
  }

  /* 初始縮放 */
  scale = size >= 32 ? 0.7 : 1;
  posX = 0;
  posY = 0;
  updateTransform();

  render();
}

/* ===== 畫面 ===== */
function render(){

  let container=document.getElementById("bracket");
  container.innerHTML="";

  rounds.forEach((round,ri)=>{

    let col=document.createElement("div");
    col.className="round";

    let gap=Math.pow(2,ri);

    round.forEach((m,mi)=>{

      let div=document.createElement("div");
      div.className="match";

      div.style.marginTop=(gap===1?0:(gap-1)*40)+"px";

      div.appendChild(makePlayer(m,"p1"));
      div.appendChild(makePlayer(m,"p2"));

      col.appendChild(div);
    });

    container.appendChild(col);
  });

  renderThird();
  renderResult();
}

/* ===== 玩家 ===== */
function makePlayer(m,key){

  let d=document.createElement("div");
  d.className="player";

  let name=m[key]||"";
  d.innerText=name;

  if(m.winner){
    if(name===m.winner)d.classList.add("win");
    else d.classList.add("lose");
  }

  d.onclick=function(){
    if(!name)return;

    m.winner=name;
    history.push(m);

    propagate();
    render();
  };

  return d;
}

/* ===== 推進 ===== */
function propagate(){

  for(let i=0;i<rounds.length-1;i++){

    let r=rounds[i];
    let n=rounds[i+1];

    r.forEach((m,mi)=>{
      if(m.winner){
        let idx=Math.floor(mi/2);
        let slot=mi%2===0?"p1":"p2";
        n[idx][slot]=m.winner;
      }
    });
  }

  /* 季軍賽 */
  if(rounds.length>=2){
    let semi=rounds[rounds.length-2];

    let losers=semi.map(m=>{
      if(!m.winner)return null;
      return m.p1===m.winner?m.p2:m.p1;
    }).filter(x=>x);

    if(losers.length===2){
      thirdMatch.p1=losers[0];
      thirdMatch.p2=losers[1];
    }
  }
}

/* ===== 季軍賽 ===== */
function renderThird(){

  if(!thirdMatch.p1)return;

  let container=document.getElementById("bracket");

  let col=document.createElement("div");
  col.className="round";

  let title=document.createElement("div");
  title.innerHTML="🥉 季軍賽";
  title.style.marginBottom="10px";

  col.appendChild(title);

  let div=document.createElement("div");
  div.className="match";

  div.appendChild(makeThirdPlayer("p1"));
  div.appendChild(makeThirdPlayer("p2"));

  col.appendChild(div);
  container.appendChild(col);
}

function makeThirdPlayer(key){

  let d=document.createElement("div");
  d.className="player";

  let name=thirdMatch[key];
  d.innerText=name||"";

  if(thirdMatch.winner){
    if(name===thirdMatch.winner)d.classList.add("win");
    else d.classList.add("lose");
  }

  d.onclick=function(){
    if(!name)return;

    thirdMatch.winner=name;
    render();
  };

  return d;
}

/* ===== 結果 ===== */
function renderResult(){

  let box=document.getElementById("resultBox");

  let final=rounds[rounds.length-1][0];
  if(!final.winner){
    box.innerHTML="";
    return;
  }

  let champion=final.winner;
  let runner=final.p1===champion?final.p2:final.p1;
  let third=thirdMatch.winner||"?";

  box.innerHTML=`
  🥇 冠軍：${champion}<br>
  🥈 亞軍：${runner}<br>
  🥉 季軍：${third}
  `;
}

/* ===== 撤回 ===== */
function undo(){
  let m=history.pop();
  if(!m)return;

  m.winner=null;
  propagate();
  render();
}

/* ===== 手機縮放拖曳 ===== */
let scale = 1;
let posX = 0;
let posY = 0;

const stage = document.getElementById("stage");
const wrapper = document.getElementById("stageWrapper");

let isDragging = false;
let startX, startY;

wrapper.addEventListener("touchstart", e=>{
  if(e.touches.length===1){
    isDragging=true;
    startX=e.touches[0].clientX-posX;
    startY=e.touches[0].clientY-posY;
  }
});

wrapper.addEventListener("touchmove", e=>{

  if(e.touches.length===1 && isDragging){
    posX=e.touches[0].clientX-startX;
    posY=e.touches[0].clientY-startY;
    updateTransform();
  }

  if(e.touches.length===2){
    let dx=e.touches[0].clientX-e.touches[1].clientX;
    let dy=e.touches[0].clientY-e.touches[1].clientY;
    let dist=Math.sqrt(dx*dx+dy*dy);

    if(window.lastDist){
      scale += (dist-window.lastDist)*0.005;
      scale=Math.max(0.5,Math.min(1.5,scale));
      updateTransform();
    }

    window.lastDist=dist;
  }
});

wrapper.addEventListener("touchend", ()=>{
  isDragging=false;
  window.lastDist=null;
});

function updateTransform(){
  stage.style.transform =
    `translate(${posX}px, ${posY}px) scale(${scale})`;
}

</script>

</body>
</html>
