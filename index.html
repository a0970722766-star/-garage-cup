<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>車庫大賽 最終穩定版</title>

<style>
body{margin:0;background:#000;color:#fff;font-family:sans-serif;text-align:center;}
h1{margin:20px;}
textarea{width:90%;height:120px;border-radius:10px;margin:10px;}
button,select{padding:8px;margin:5px;border-radius:8px;border:none;}

#view{overflow:auto;height:70vh;}
#bracket{position:relative;}
.match{position:absolute;}

.player{
  width:140px;
  padding:8px;
  margin:4px 0;
  border-radius:8px;
  background:#2ecc71;
  cursor:pointer;
}
.win{background:#00c853;}
.lose{background:#444;}

svg{position:absolute;top:0;left:0;pointer-events:none;}
</style>
</head>

<body>

<h1>🏆 車庫大賽</h1>

<select id="mode">
<option value="8">8人</option>
<option value="16">16人</option>
<option value="32">32人</option>
<option value="64">64人</option>
</select>

<br>

<button id="startBtn">開始</button>
<button id="undoBtn">撤回</button>

<textarea id="input">玩家1
玩家2
玩家3
玩家4
玩家5
玩家6
玩家7
玩家8</textarea>

<div id="view">
  <div id="bracket"></div>
  <svg id="lines"></svg>
</div>

<div id="result"></div>

<script>
document.addEventListener("DOMContentLoaded", () => {

const input = document.getElementById("input");
const bracket = document.getElementById("bracket");
const lines = document.getElementById("lines");
const result = document.getElementById("result");
const mode = document.getElementById("mode");

const startBtn = document.getElementById("startBtn");
const undoBtn = document.getElementById("undoBtn");

let rounds = [];
let history = [];

/* ===== 開始 ===== /
startBtn.addEventListener("click", () => {

  let names = input.value.split("\n").filter(x=>x.trim());
  let size = parseInt(mode.value);

  while(names.length < size){
    names.push("玩家"+(names.length+1));
  }

  rounds = [];
  history = [];

  let cur = [...names];

  while(cur.length > 1){
    let r = [];
    let next = [];

    for(let i=0;i<cur.length;i+=2){
      r.push({p1:cur[i],p2:cur[i+1],winner:null});
      next.push(null);
    }

    rounds.push(r);
    cur = next;
  }

  render();
});

/ ===== 渲染 ===== /
function render(){
  bracket.innerHTML="";
  lines.innerHTML="";
  result.innerHTML="";

  let colW = 200;
  let rowH = 80;

  rounds.forEach((round,ri)=>{
    round.forEach((m,mi)=>{

      let x = ri * colW;
      let y = mi * rowH * Math.pow(2,ri);

      let div = document.createElement("div");
      div.className="match";
      div.style.left=x+"px";
      div.style.top=y+"px";

      div.appendChild(makePlayer(m,"p1"));
      div.appendChild(makePlayer(m,"p2"));

      bracket.appendChild(div);

      if(ri>0){
        let prev=Math.floor(mi/2);

        drawLine(
          x-60,
          prevrowHMath.pow(2,ri-1)+20,
          x,
          y+20
        );
      }
    });
  });

  bracket.style.width = (rounds.length220)+"px";
  bracket.style.height = "1500px";
}

/* ===== 玩家 ===== /
function makePlayer(m,key){
  let div = document.createElement("div");
  div.className="player";

  let name = m[key];
  div.innerText = name;

  if(m.winner){
    if(name === m.winner) div.classList.add("win");
    else div.classList.add("lose");
  }

  div.onclick = () => {
    m.winner = name;
    history.push(m);

    propagate();
    render();
  };

  return div;
}

/ ===== 線 ===== /
function drawLine(x1,y1,x2,y2){
  let p = document.createElementNS("http://www.w3.org/2000/svg","path");
  p.setAttribute("d",M${x1} ${y1} H${x2-30} V${y2} H${x2});
  p.setAttribute("stroke","#fff");
  p.setAttribute("fill","none");
  lines.appendChild(p);
}

/ ===== 晉級 ===== /
function propagate(){
  for(let i=0;i<rounds.length-1;i++){
    let r = rounds[i];
    let n = rounds[i+1];

    r.forEach((m,mi)=>{
      if(m.winner){
        let idx=Math.floor(mi/2);
        let slot = (mi%2===0?"p1":"p2");
        n[idx][slot] = m.winner;
      }
    });
  }

  checkWinner();
}

/ ===== 冠軍 ===== /
function checkWinner(){
  let last = rounds[rounds.length-1];
  if(last[0].winner){
    result.innerHTML="🏆 冠軍："+last[0].winner;
  }
}

/ ===== 撤回 ===== */
undoBtn.addEventListener("click", ()=>{
  let m = history.pop();
  if(!m) return;
  m.winner=null;
  propagate();
  render();
});

});
</script>

</body>
