<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>車庫大賽 Pro</title>

<style>
body{
  margin:0;
  background:#000;
  color:#fff;
  font-family:sans-serif;
  text-align:center;
}

h1{margin:20px}

.controls{
  display:flex;
  justify-content:center;
  gap:10px;
  flex-wrap:wrap;
}

textarea{
  width:90%;
  height:120px;
  border-radius:10px;
  padding:10px;
}

button,select{
  padding:10px 14px;
  border-radius:10px;
  border:none;
}

#viewport{
  width:100%;
  height:70vh;
  overflow:auto;
  border-top:1px solid #333;
}

#stage{
  position:relative;
  transform-origin:0 0;
}

.match{
  position:absolute;
  width:150px;
}

.player{
  background:#1f9d3a;
  margin:5px 0;
  padding:8px;
  border-radius:8px;
  cursor:pointer;
}

.win{background:#4caf50}
.lose{background:#444}

svg{
  position:absolute;
  top:0;
  left:0;
  pointer-events:none;
}

.result{
  margin:20px;
  font-size:18px;
}
</style>
</head>

<body>

<h1>🏆 車庫大賽 Pro</h1>

<div class="controls">
<select id="mode">
<option>8</option>
<option>16</option>
<option>32</option>
<option>48</option>
<option>64</option>
</select>

<button onclick="start()">開始</button>
<button onclick="undo()">撤回</button>
<button onclick="zoom(1.2)">放大</button>
<button onclick="zoom(0.8)">縮小</button>
</div>

<textarea id="input">玩家1
玩家2
玩家3
玩家4
玩家5
玩家6
玩家7
玩家8</textarea>

<div id="viewport">
  <div id="stage"></div>
  <svg id="lines"></svg>
</div>

<div class="result" id="result"></div>

<script>
let rounds=[];
let history=[];
let scale=1;

function zoom(s){
  scale*=s;
  stage.style.transform=`scale(${scale})`;
}

function undo(){
  let last=history.pop();
  if(!last) return;
  last.match.winner=null;
  propagate();
  render();
}

function start(){
  let names=input.value.split("\n").filter(x=>x.trim());
  let mode=parseInt(document.getElementById("mode").value);

  while(names.length<mode){
    names.push("玩家"+(names.length+1));
  }

  rounds = build(names,mode);
  history=[];
  render();
}

function build(players,mode){
  let r=[];
  let cur=[...players];
  let is48 = mode===48;

  while(true){

    if(is48 && cur.length===3){
      r.push({type:"final3",players:[...cur]});
      break;
    }

    if(!is48 && cur.length===1) break;

    let matches=[];
    let next=[];

    for(let i=0;i<cur.length;i+=2){
      let p1=cur[i];
      let p2=cur[i+1] || null;

      matches.push({p1,p2,winner:null,loser:null});
      next.push(null);
    }

    r.push(matches);
    cur=next;
  }

  return r;
}

function render(){
  stage.innerHTML="";
  lines.innerHTML="";

  let colW=220;
  let rowH=120;

  rounds.forEach((round,ri)=>{

    if(round.type==="final3"){
      drawFinal3(round);
      return;
    }

    round.forEach((m,mi)=>{
      let x=ri*colW;
      let y=mi*rowH;

      let div=document.createElement("div");
      div.className="match";
      div.style.left=x+"px";
      div.style.top=y+"px";

      let p1=createPlayer(m,0);
      let p2=createPlayer(m,1);

      div.appendChild(p1);
      div.appendChild(p2);
      stage.appendChild(div);

      // 畫線
      if(ri>0){
        let prevIndex=Math.floor(mi/2);

        drawLine(
          (ri-1)*colW+150,
          prevIndex*rowH+30,
          x,
          y+30
        );
      }
    });
  });

  stage.style.width=(rounds.length*240)+"px";
  stage.style.height="2000px";
}

function createPlayer(m,side){
  let div=document.createElement("div");
  div.className="player";

  let name = side===0?m.p1:m.p2;
  div.innerText=name || "?";

  if(m.winner){
    if(m.winner===name) div.classList.add("win");
    else div.classList.add("lose");
  }

  div.onclick=()=>{
    if(!name) return;

    m.winner=name;
    m.loser= side===0?m.p2:m.p1;

    history.push({match:m});
    propagate();
    render();
  };

  return div;
}

function drawLine(x1,y1,x2,y2){
  let path=document.createElementNS("http://www.w3.org/2000/svg","path");

  let d=`M${x1} ${y1} H${(x1+x2)/2} V${y2} H${x2}`;

  path.setAttribute("d",d);
  path.setAttribute("stroke","#fff");
  path.setAttribute("fill","none");

  lines.appendChild(path);
}

function propagate(){
  for(let i=0;i<rounds.length-1;i++){
    let r=rounds[i];
    let n=rounds[i+1];

    if(n.type==="final3") continue;

    r.forEach((m,mi)=>{
      if(m.winner){
        let idx=Math.floor(mi/2);
        let slot=mi%2===0?"p1":"p2";
        n[idx][slot]=m.winner;
      }
    });
  }

  handleFinal();
}

function handleFinal(){
  let last=rounds[rounds.length-1];

  if(last.type==="final3") return;

  if(last.length===1 && last[0].winner){

    let champ=last[0].winner;
    let runner=last[0].loser;

    let semi=rounds[rounds.length-2];
    let losers=semi.map(m=>m.loser).filter(Boolean);

    if(losers.length===2){
      result.innerHTML=`
      🥇 ${champ}<br>
      🥈 ${runner}<br>
      🥉 ${losers[0]} vs ${losers[1]}
      `;
    }
  }
}

let finalScore={};

function drawFinal3(r){
  let p=r.players;

  if(p.includes(null)){
    result.innerHTML="等待產生三強";
    return;
  }

  result.innerHTML=`
  🥇🥈🥉 三人循環<br><br>
  <div onclick="pick('${p[0]}','${p[1]}')">${p[0]} vs ${p[1]}</div>
  <div onclick="pick('${p[1]}','${p[2]}')">${p[1]} vs ${p[2]}</div>
  <div onclick="pick('${p[0]}','${p[2]}')">${p[0]} vs ${p[2]}</div>
  `;
}

function pick(a,b){
  let win = confirm(`確定 ${a} 勝？取消=${b}`) ? a : b;
  finalScore[win]=(finalScore[win]||0)+1;

  if(Object.values(finalScore).reduce((a,b)=>a+b,0)>=3){
    let sorted=Object.entries(finalScore).sort((a,b)=>b[1]-a[1]);

    result.innerHTML=`
    🥇 ${sorted[0][0]}<br>
    🥈 ${sorted[1]?.[0]||"-"}<br>
    🥉 ${sorted[2]?.[0]||"-"}
    `;
  }
}
</script>

</body>
</html>
